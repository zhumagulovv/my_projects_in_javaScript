<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2 class="title">Color Changer App</h2>

        <div class="block"></div>

        <div class="buttons">
            <button class="color_btn" data-color="red">Red</button>
            <button class="color_btn" data-color="blue">Blue</button>
            <button class="color_btn" data-color="green">Green</button>
            <button class="color_btn" data-color="orange">Orange</button>
            <button class="color_btn" data-color="purple">Purple</button>
        </div>
    </div>

    <script src="./index.js"></script>

</body>

</html>
