<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Weekly School Expenses</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2 class="title">Average Weekly School Expenses</h2>
    <form class="form">
        <div class="form_content">
            <label>Monday</label>
            <input type="number" placeholder="Enter your expenses som">
        </div>
        <div class="form_content">
            <label>Tuesday</label>
            <input type="number" placeholder="Enter your expenses som">
        </div>
        <div class="form_content">
            <label>Wednesday</label>
            <input type="number" placeholder="Enter your expenses som">
        </div>
        <div class="form_content">
            <label>Thursday</label>
            <input type="number" placeholder="Enter your expenses som">
        </div>
        <div class="form_content">
            <label>Friday</label>
            <input type="number" placeholder="Enter your expenses som">
        </div>

        <button class="expenses_btn">Submit</button>
    </form>

    <div class="bottom">
        <h2 class="result_title">Weekly Expense Summary</h2>
        <div class="result_summary"></div> 
    </div>

    <script src="./index.js"></script>
</body>

</html>
